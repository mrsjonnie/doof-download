name: Generate Doof RSS, OPML and M3U playlists

on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch:

concurrency:
  group: triple-j-doof-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate RSS, OPML, M3U and MP3 files
        run: |
          python generate_feed.py

      - name: Show generated files
        run: |
          find docs -maxdepth 2 -type f -printf "%p\n" | sort

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit generated files
        run: |
          git add -A docs
          if ! git diff --cached --quiet; then
            git commit -m "Update Doof RSS, OPML, M3U and MP3 files $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
